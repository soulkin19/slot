<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スロットゲーム & ランキング</title>
  <style>
    /* 共通設定 */
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a1a2e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* ハンバーガーメニューボタン */
    #hamburger-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: #0f3460;
      color: white;
      border: none;
      font-size: 24px;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background 0.2s;
    }
    #hamburger-btn:hover { background: #e94560; }

    /* サイドメニュー (初期状態は画面外) */
    #side-menu {
      position: fixed;
      top: 0;
      left: -300px;
      width: 260px;
      height: 100%;
      background-color: #16213e;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      z-index: 999;
      transition: left 0.3s ease;
      padding: 70px 20px 20px; /* 上部はボタンと被らないように余白 */
      box-sizing: border-box;
      overflow-y: auto;
    }
    #side-menu.open { left: 0; }

    /* メニュー内の要素 */
    .menu-section {
      margin-bottom: 30px;
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
    }
    .menu-section h3 { margin-top: 0; border-bottom: 2px solid #e94560; padding-bottom: 5px; }
    
    /* 自動スピン トグル */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 16px;
      font-weight: bold;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; border-radius: 24px; transition: .4s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px; left: 3px; bottom: 3px;
      background-color: white; border-radius: 50%; transition: .4s;
    }
    input:checked + .slider { background-color: #e94560; }
    input:checked + .slider:before { transform: translateX(26px); }

    /* ランキング */
    select {
      width: 100%; padding: 8px; margin-bottom: 15px;
      background: #1a1a2e; color: white; border: 1px solid #e94560; border-radius: 4px;
    }
    #ranking-list { list-style: none; padding: 0; margin: 0; font-size: 14px; }
    #ranking-list li {
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-between;
    }
    #ranking-list li:last-child { border-bottom: none; }
    .rank-num { font-weight: bold; color: #e94560; width: 25px; }

    /* スロット画面 */
    #game-container {
      text-align: center;
      background: #0f3460;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 4px solid #e94560;
    }
    .stats {
      display: flex; justify-content: space-around;
      margin-bottom: 20px; font-size: 20px; font-weight: bold;
    }
    .reels {
      display: flex; gap: 15px; margin-bottom: 25px; justify-content: center;
    }
    .reel {
      width: 80px; height: 80px;
      background: #fff; color: #000;
      font-size: 40px;
      display: flex; justify-content: center; align-items: center;
      border-radius: 10px;
      box-shadow: inset 0 3px 5px rgba(0,0,0,0.3);
    }
    #spin-btn {
      background: #e94560; color: white;
      border: none; padding: 15px 40px;
      font-size: 24px; font-weight: bold; border-radius: 8px;
      cursor: pointer; transition: transform 0.1s;
      box-shadow: 0 5px 0 #b32a42;
    }
    #spin-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #b32a42; }
    #spin-btn:disabled { background: #555; box-shadow: 0 5px 0 #333; cursor: not-allowed; transform: none; }
    #message { margin-top: 15px; height: 24px; font-size: 18px; color: #f9ca24; font-weight: bold; }
  </style>
</head>
<body>

  <!-- ハンバーガーボタン -->
  <button id="hamburger-btn">☰</button>

  <!-- サイドメニュー -->
  <div id="side-menu">
    <div class="menu-section">
      <h3>設定</h3>
      <div class="toggle-container">
        <span>自動スピン</span>
        <label class="toggle-switch">
          <input type="checkbox" id="auto-spin-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="menu-section">
      <h3>🏆 ランキング</h3>
      <select id="ranking-category">
        <option value="credits">所持クレジット</option>
        <option value="jackpotCount">🈵 当たり回数</option>
        <option value="totalSpins">累計スピン数</option>
        <option value="manualSpins">手動スピン数</option>
        <option value="autoSpins">自動スピン数</option>
      </select>
      <ul id="ranking-list">
        <li>読み込み中...</li>
      </ul>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-container">
    <div class="stats">
      <div>プレイヤー: <span id="player-name-display">---</span></div>
      <div>💰 <span id="credit-display">1000</span></div>
    </div>
    <div class="reels">
      <div class="reel" id="reel1">🍒</div>
      <div class="reel" id="reel2">🔔</div>
      <div class="reel" id="reel3">🍇</div>
    </div>
    <button id="spin-btn">SPIN (10枚)</button>
    <div id="message"></div>
  </div>

  <!-- Firebase v9 & ゲームロジック (Type: moduleを使用) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, increment, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🔴 ご自身のFirebaseプロジェクトの設定に書き換えてください
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    let db;
    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Firebaseが設定されていません。ローカルでのみ動作します。");
    }

    // --- プレイヤーデータ管理 ---
    let playerId = localStorage.getItem("slotPlayerId");
    let playerName = localStorage.getItem("slotPlayerName");
    
    if (!playerId) {
      playerId = 'user_' + Math.random().toString(36).substr(2, 9);
      playerName = prompt("ランキングに表示する名前を入力してください", "名無しギャンブラー") || "名無しギャンブラー";
      localStorage.setItem("slotPlayerId", playerId);
      localStorage.setItem("slotPlayerName", playerName);
      
      // 初回登録 (Firebase)
      if (db) {
        setDoc(doc(db, "users", playerId), {
          playerName: playerName,
          credits: 1000,
          jackpotCount: 0,
          totalSpins: 0,
          manualSpins: 0,
          autoSpins: 0
        }, { merge: true });
      }
    }
    document.getElementById("player-name-display").textContent = playerName;

    // --- ゲーム設定 ---
    const symbols = ['🍒', '🍇', '🔔', '🍉', '7️⃣', '🈵'];
    let credits = 1000; // 初期クレジット（DB連携している場合は後で上書きされます）
    const spinCost = 10;
    let isSpinning = false;
    let isAutoMode = false;
    let autoSpinTimeout;

    // UI要素の取得
    const creditDisplay = document.getElementById("credit-display");
    const spinBtn = document.getElementById("spin-btn");
    const msgDisplay = document.getElementById("message");
    const reels = [document.getElementById("reel1"), document.getElementById("reel2"), document.getElementById("reel3")];

    // --- UI/メニュー制御 ---
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sideMenu = document.getElementById('side-menu');
    const autoSpinToggle = document.getElementById('auto-spin-toggle');
    const rankingCategory = document.getElementById('ranking-category');

    hamburgerBtn.addEventListener('click', () => {
      sideMenu.classList.toggle('open');
      if (sideMenu.classList.contains('open')) {
        loadRanking(rankingCategory.value); // 開いた時にランキング更新
      }
    });

    autoSpinToggle.addEventListener('change', (e) => {
      isAutoMode = e.target.checked;
      if (isAutoMode && !isSpinning) {
        startSpin(true);
      } else if (!isAutoMode) {
        clearTimeout(autoSpinTimeout);
      }
    });

    rankingCategory.addEventListener('change', (e) => {
      loadRanking(e.target.value);
    });

    // --- ランキング取得 (Firebase) ---
    async function loadRanking(category) {
      const listElement = document.getElementById("ranking-list");
      listElement.innerHTML = "<li>読み込み中...</li>";
      
      if (!db) {
        listElement.innerHTML = "<li>データベース未接続</li>";
        return;
      }

      try {
        const usersRef = collection(db, "users");
        const q = query(usersRef, orderBy(category, "desc"), limit(10));
        const querySnapshot = await getDocs(q);
        
        listElement.innerHTML = "";
        let rank = 1;
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const score = data[category] || 0;
          
          const li = document.createElement("li");
          li.innerHTML = `<span class="rank-num">${rank}</span> <span class="rank-name">${data.playerName}</span> <span class="rank-score">${score}</span>`;
          listElement.appendChild(li);
          rank++;
        });
      } catch (e) {
        console.error("ランキング取得エラー:", e);
        listElement.innerHTML = "<li>取得に失敗しました<br>※Firestoreのインデックス設定が必要な場合があります</li>";
      }
    }

    // --- データ保存 (Firebase) ---
    async function saveStats(isAuto, winAmount, isJackpot) {
      if (!db) return;
      const userRef = doc(db, "users", playerId);
      
      const updateData = {
        credits: credits,
        totalSpins: increment(1)
      };
      
      if (isAuto) updateData.autoSpins = increment(1);
      else updateData.manualSpins = increment(1);
      
      if (isJackpot) updateData.jackpotCount = increment(1);

      try {
        await updateDoc(userRef, updateData);
      } catch (e) {
        // ドキュメントが存在しない場合は新規作成
        if (e.code === 'not-found') {
           await setDoc(userRef, {
             playerName: playerName,
             credits: credits,
             jackpotCount: isJackpot ? 1 : 0,
             totalSpins: 1,
             manualSpins: isAuto ? 0 : 1,
             autoSpins: isAuto ? 1 : 0
           });
        }
      }
    }

    // --- ゲームロジック ---
    function updateCredits(amount) {
      credits += amount;
      creditDisplay.textContent = credits;
    }

    async function startSpin(isAuto = false) {
      if (isSpinning || credits < spinCost) {
        if (credits < spinCost) msgDisplay.textContent = "クレジットが足りません！";
        if (isAutoMode) {
          isAutoMode = false;
          autoSpinToggle.checked = false;
        }
        return;
      }

      isSpinning = true;
      spinBtn.disabled = true;
      updateCredits(-spinCost);
      msgDisplay.textContent = "";

      // スピン演出 (簡易アニメーション)
      let spinCount = 0;
      const spinInterval = setInterval(() => {
        reels.forEach(reel => {
          reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        });
        spinCount++;
        
        if (spinCount > 15) { // 約1.5秒後に停止
          clearInterval(spinInterval);
          judgeResult(isAuto);
        }
      }, 100);
    }

    function judgeResult(isAuto) {
      const result = [
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)]
      ];

      reels[0].textContent = result[0];
      reels[1].textContent = result[1];
      reels[2].textContent = result[2];

      let winAmount = 0;
      let isJackpot = false;

      // 判定ロジック
      if (result[0] === result[1] && result[1] === result[2]) {
        // 3つ揃い
        if (result[0] === '🈵') {
          winAmount = 1000;
          isJackpot = true;
          msgDisplay.textContent = "🎉 超大当たり！ 1000枚獲得！ 🎉";
        } else if (result[0] === '7️⃣') {
          winAmount = 300;
          msgDisplay.textContent = "🎯 大当たり！ 300枚獲得！";
        } else {
          winAmount = 100;
          msgDisplay.textContent = "🎊 当たり！ 100枚獲得！";
        }
      } else if (result[0] === result[1] || result[1] === result[2] || result[0] === result[2]) {
        // 2つ揃い (小役)
        winAmount = 20;
        msgDisplay.textContent = "✨ 小当たり！ 20枚獲得！";
      }

      if (winAmount > 0) {
        updateCredits(winAmount);
      }

      // データの保存
      saveStats(isAuto, winAmount, isJackpot);

      isSpinning = false;
      spinBtn.disabled = false;

      // 自動スピンがオンなら次を実行
      if (isAutoMode && credits >= spinCost) {
        autoSpinTimeout = setTimeout(() => startSpin(true), 800); // 0.8秒間隔で次へ
      } else if (isAutoMode && credits < spinCost) {
        isAutoMode = false;
        autoSpinToggle.checked = false;
        msgDisplay.textContent = "クレジットが足りないため自動停止しました";
      }
    }

    // イベントリスナーの登録
    spinBtn.addEventListener('click', () => {
      // 手動スピン時は自動スピンをオフにする
      if (isAutoMode) {
        isAutoMode = false;
        autoSpinToggle.checked = false;
        clearTimeout(autoSpinTimeout);
      }
      startSpin(false);
    });

  </script>
</body>
</html>
