<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase スロットゲーム</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin-top: 50px;
        }
        #game-section { display: none; }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .reel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .reel {
            width: 90px;
            height: 90px;
            background-color: #fff;
            border: 4px solid #f1c40f;
            border-radius: 10px;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            margin: 5px;
        }
        button:hover:not(:disabled) { background-color: #c0392b; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        
        .stop-btn {
            background-color: #3498db;
            font-size: 16px;
            padding: 8px 16px;
        }
        .stop-btn:hover:not(:disabled) { background-color: #2980b9; }

        input {
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            margin: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        #message { font-size: 20px; font-weight: bold; color: #f1c40f; height: 30px; margin-top: 20px; }
        .credit-box { font-size: 24px; margin-bottom: 20px; }
        .odds-table {
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #34495e;
            font-size: 14px;
        }
        .odds-table th, .odds-table td {
            border: 1px solid #7f8c8d;
            padding: 5px 15px;
        }

        /* ランキングサイドバー・ハンバーガーメニューのスタイル */
        #hamburger-menu {
            position: fixed;
            top: 15px;
            left: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 1000;
            user-select: none;
        }
        #sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 260px;
            height: 100%;
            background-color: #1abc9c;
            color: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            transition: left 0.3s ease;
            z-index: 1001;
            overflow-y: auto;
            padding: 20px;
            text-align: left;
        }
        #sidebar.open {
            left: 0;
        }
        #sidebar-close {
            text-align: right;
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #sidebar h2 {
            margin-top: 0;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
        }
        #sidebar h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-top: 20px;
            margin-bottom: 5px;
            background: #fff;
            padding: 5px 10px;
            border-radius: 5px;
        }
        #sidebar ol {
            margin: 0;
            padding-left: 25px;
            font-size: 14px;
        }
        #sidebar ol li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- ハンバーガーメニュー -->
    <div id="hamburger-menu">☰</div>
    
    <!-- ランキングサイドバー -->
    <div id="sidebar">
        <div id="sidebar-close">×</div>
        <h2>🏆 ランキング</h2>
        <div id="ranking-container">
            <p>データ読み込み中...</p>
        </div>
    </div>

    <h1>🎰 スロットゲーム</h1>

    <!-- ログインセクション -->
    <div id="login-section">
        <p>ログインまたは新規登録</p>
        <input type="text" id="username-input" placeholder="ユーザー名" />
        <input type="password" id="password-input" placeholder="パスワード" />
        <button id="login-btn">ログイン / 登録</button>
    </div>

    <!-- ゲームプレイセクション -->
    <div id="game-section">
        <p>プレイヤー: <strong id="display-name"></strong></p>
        <div class="credit-box">
            クレジット: <span id="credit-display">0</span>
        </div>

        <!-- オッズ表 -->
        <table class="odds-table">
            <tr><th>絵柄</th><th>倍率 (配当)</th></tr>
            <tr><td>🈵 🈵 🈵</td><td>x 300</td></tr>
            <tr><td>7️⃣ 7️⃣ 7️⃣</td><td>x 100</td></tr>
            <tr><td>💎 💎 💎</td><td>x 50</td></tr>
            <tr><td>🍊 🍊 🍊</td><td>x 30</td></tr>
            <tr><td>🍉 🍉 🍉</td><td>x 20</td></tr>
            <tr><td>🍇 🍇 🍇</td><td>x 15</td></tr>
            <tr><td>🍋 🍋 🍋</td><td>x 10</td></tr>
            <tr><td>🍎 🍎 🍎</td><td>x 5</td></tr>
            <tr><td>🍒 (どれか1つでも)</td><td>x 2</td></tr>
        </table>

        <!-- スロットマシン本体 -->
        <div class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel1">🍒</div>
                <button class="stop-btn" id="stop-btn1" disabled>止める</button>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel2">🍎</div>
                <button class="stop-btn" id="stop-btn2" disabled>止める</button>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel3">🍋</div>
                <button class="stop-btn" id="stop-btn3" disabled>止める</button>
            </div>
        </div>

        <div>
            ベット額: 
            <select id="bet-amount" style="padding: 5px; font-size: 16px;">
                <option value="1">1</option>
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="50">50</option>
            </select>
        </div>

        <button id="spin-btn">スピン！</button>
        <button id="auto-spin-btn" style="background-color: #9b59b6;">オートスピン開始</button>
        <button id="auto-stop-btn" style="background-color: #f39c12; display: none;">オートスピン停止</button>
        <p id="message"></p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf",
            measurementId: "G-S5Z8TTWYE2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUsername = "";
        let currentCredit = 0;
        let spinCount = 0; 
        
        // ランキング用ステータス変数
        let totalSpinCount = 0;
        let manualSpinCount = 0;
        let autoSpinCount = 0;
        let manCount = 0;
        
        const INITIAL_CREDIT = 100;

        // --- シンボルの設定（低い順） ---
        const symbolConfig = [
            { icon: "🍒", multiplier: 2,   weight: 40 }, 
            { icon: "🍎", multiplier: 5,   weight: 30 },
            { icon: "🍋", multiplier: 10,  weight: 25 },
            { icon: "🍇", multiplier: 15,  weight: 20 },
            { icon: "🍉", multiplier: 20,  weight: 15 },
            { icon: "🍊", multiplier: 30,  weight: 10 },
            { icon: "💎", multiplier: 50,  weight: 5  },
            { icon: "7️⃣", multiplier: 100, weight: 3  },
            { icon: "🈵", multiplier: 300, weight: 1  }  
        ];

        const weightedSymbols = [];
        const allIcons = [];
        symbolConfig.forEach(symbol => {
            allIcons.push(symbol.icon);
            for (let i = 0; i < symbol.weight; i++) {
                weightedSymbols.push(symbol);
            }
        });

        function getRandomSymbol() {
            return weightedSymbols[Math.floor(Math.random() * weightedSymbols.length)];
        }

        // --- HTML要素の取得 ---
        const loginSection = document.getElementById('login-section');
        const gameSection = document.getElementById('game-section');
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const displayName = document.getElementById('display-name');
        const creditDisplay = document.getElementById('credit-display');
        const spinBtn = document.getElementById('spin-btn');
        const autoSpinBtn = document.getElementById('auto-spin-btn');
        const autoStopBtn = document.getElementById('auto-stop-btn');
        const messageDisplay = document.getElementById('message');
        const betSelect = document.getElementById('bet-amount');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const stopBtns = [
            document.getElementById('stop-btn1'),
            document.getElementById('stop-btn2'),
            document.getElementById('stop-btn3')
        ];

        // メニュー要素
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const sidebar = document.getElementById('sidebar');
        const sidebarClose = document.getElementById('sidebar-close');
        const rankingContainer = document.getElementById('ranking-container');

        let reelIntervals = [null, null, null];
        let isSpinning = [false, false, false];
        let finalResults = [null, null, null];
        let currentBetAmount = 0;
        
        let isGuaranteedSpin = false;
        let guaranteedSymbol = null;

        // オートスピン用変数
        let isAutoSpinning = false;
        let autoSpinTimeout = null;

        // --- メニューの開閉とランキング読み込み ---
        hamburgerMenu.addEventListener('click', () => {
            sidebar.classList.add('open');
            loadRanking();
        });

        sidebarClose.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        async function loadRanking() {
            rankingContainer.innerHTML = '<p>データ読み込み中...</p>';
            
            const fields = [
                { key: 'credit', title: '💰 クレジット数', unit: 'C' },
                { key: 'manCount', title: '🈵 🈵当て回数', unit: '回' },
                { key: 'totalSpinCount', title: '🔄 累計スピン数', unit: '回' },
                { key: 'manualSpinCount', title: '👆 手動スピン数', unit: '回' },
                { key: 'autoSpinCount', title: '⚡ オートスピン数', unit: '回' }
            ];

            let html = '';
            const usersRef = ref(db, 'users');
            
            for (const field of fields) {
                html += `<h3>${field.title}</h3><ol>`;
                try {
                    // 表示人数を10人に設定
                    const q = query(usersRef, orderByChild(field.key), limitToLast(10));
                    const snapshot = await get(q);
                    if (snapshot.exists()) {
                        const data = [];
                        snapshot.forEach(childSnapshot => {
                            data.push({
                                username: childSnapshot.key,
                                value: childSnapshot.val()[field.key] || 0
                            });
                        });
                        // 降順ソート
                        data.sort((a, b) => b.value - a.value);
                        
                        data.forEach(item => {
                            html += `<li>${item.username} : ${item.value} ${field.unit}</li>`;
                        });
                    } else {
                        html += `<li>データなし</li>`;
                    }
                } catch (e) {
                    console.error(e);
                    html += `<li>取得エラー</li>`;
                }
                html += `</ol>`;
            }
            rankingContainer.innerHTML = html;
        }

        // --- ログイン・登録処理 ---
        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) return alert("ユーザー名とパスワードを入力してください！");

            currentUsername = username;
            const dbRef = ref(db);
            const userRef = ref(db, 'users/' + currentUsername);

            try {
                const snapshot = await get(child(dbRef, `users/${currentUsername}`));
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password !== password) {
                        return alert("パスワードが間違っています。");
                    }
                    currentCredit = userData.credit;
                    spinCount = userData.spinCount || 0;
                    totalSpinCount = userData.totalSpinCount || 0;
                    manualSpinCount = userData.manualSpinCount || 0;
                    autoSpinCount = userData.autoSpinCount || 0;
                    manCount = userData.manCount || 0;
                } else {
                    currentCredit = INITIAL_CREDIT;
                    spinCount = 0;
                    totalSpinCount = 0;
                    manualSpinCount = 0;
                    autoSpinCount = 0;
                    manCount = 0;
                    await set(userRef, { 
                        password: password,
                        credit: currentCredit,
                        spinCount: spinCount,
                        totalSpinCount: totalSpinCount,
                        manualSpinCount: manualSpinCount,
                        autoSpinCount: autoSpinCount,
                        manCount: manCount
                    });
                }

                loginSection.style.display = 'none';
                gameSection.style.display = 'block';
                displayName.textContent = currentUsername;

                onValue(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        currentCredit = data.credit;
                        spinCount = data.spinCount || 0;
                        totalSpinCount = data.totalSpinCount || 0;
                        manualSpinCount = data.manualSpinCount || 0;
                        autoSpinCount = data.autoSpinCount || 0;
                        manCount = data.manCount || 0;
                        
                        creditDisplay.textContent = currentCredit;
                        if (!isSpinning.includes(true) && !isAutoSpinning) {
                            checkSpinPossibility();
                        }
                    }
                });
            } catch (error) {
                console.error(error);
                alert("データベースエラーです。");
            }
        });

        function checkSpinPossibility() {
            const betAmount = parseInt(betSelect.value, 10);
            const canSpin = currentCredit >= betAmount;
            spinBtn.disabled = !canSpin;
            autoSpinBtn.disabled = !canSpin;
            if (!canSpin && isAutoSpinning) {
                stopAutoSpin();
                messageDisplay.textContent = "クレジットが不足しています！";
                messageDisplay.style.color = "#e74c3c";
            }
        }
        betSelect.addEventListener('change', checkSpinPossibility);

        // --- スピン処理 ---
        async function executeSpin(isAuto = false) {
            currentBetAmount = parseInt(betSelect.value, 10);
            if (currentCredit < currentBetAmount) return;

            spinBtn.disabled = true;
            betSelect.disabled = true;
            autoSpinBtn.disabled = true;
            
            messageDisplay.textContent = isAuto ? "⚡ オートスピン中..." : "リールを止めてください！";
            messageDisplay.style.color = "#ecf0f1";
            finalResults = [null, null, null];
            
            spinCount++;
            totalSpinCount++;
            if (isAuto) {
                autoSpinCount++;
            } else {
                manualSpinCount++;
            }
            
            if (spinCount >= 100) {
                isGuaranteedSpin = true;
                spinCount = 0; 
                const winSymbols = symbolConfig.filter(s => s.icon !== "🍒");
                guaranteedSymbol = winSymbols[Math.floor(Math.random() * winSymbols.length)];
            } else {
                isGuaranteedSpin = false;
                guaranteedSymbol = null;
            }

            const newCredit = currentCredit - currentBetAmount;
            
            await update(ref(db, 'users/' + currentUsername), { 
                credit: newCredit,
                spinCount: spinCount,
                totalSpinCount: totalSpinCount,
                manualSpinCount: manualSpinCount,
                autoSpinCount: autoSpinCount
            });

            reels.forEach((reel, i) => {
                isSpinning[i] = true;
                stopBtns[i].disabled = isAuto; // オートスピン中は手動ストップ不可

                reelIntervals[i] = setInterval(() => {
                    reel.textContent = allIcons[Math.floor(Math.random() * allIcons.length)];
                }, 50); 
            });

            // オートスピンの停止シーケンス
            if (isAuto) {
                autoSpinTimeout = setTimeout(() => {
                    if (!isAutoSpinning) return;
                    stopReel(0, true);
                    autoSpinTimeout = setTimeout(() => {
                        if (!isAutoSpinning) return;
                        stopReel(1, true);
                        autoSpinTimeout = setTimeout(() => {
                            if (!isAutoSpinning) return;
                            stopReel(2, true);
                        }, 500);
                    }, 500);
                }, 1000);
            }
        }

        spinBtn.addEventListener('click', () => {
            if (isAutoSpinning) return;
            executeSpin(false);
        });

        // --- オートスピン制御 ---
        autoSpinBtn.addEventListener('click', () => {
            isAutoSpinning = true;
            autoSpinBtn.style.display = 'none';
            autoStopBtn.style.display = 'inline-block';
            checkSpinPossibility();
            if (currentCredit >= parseInt(betSelect.value, 10)) {
                executeSpin(true);
            }
        });

        autoStopBtn.addEventListener('click', () => {
            stopAutoSpin();
            messageDisplay.textContent = "オートスピンを停止しました";
            messageDisplay.style.color = "#ecf0f1";
        });

        function stopAutoSpin() {
            isAutoSpinning = false;
            autoSpinBtn.style.display = 'inline-block';
            autoStopBtn.style.display = 'none';
            if (autoSpinTimeout) clearTimeout(autoSpinTimeout);
            
            if (!isSpinning.includes(true)) {
                betSelect.disabled = false;
                checkSpinPossibility();
            } else {
                // スピン中の場合は手動ストップボタンを有効化
                stopBtns.forEach((btn, i) => {
                    if (isSpinning[i]) btn.disabled = false;
                });
            }
        }

        // --- ストップ処理 ---
        function stopReel(index, isAuto = false) {
            if (!isSpinning[index]) return;

            clearInterval(reelIntervals[index]);
            isSpinning[index] = false;
            stopBtns[index].disabled = true;

            const resultSymbol = isGuaranteedSpin ? guaranteedSymbol : getRandomSymbol();
            finalResults[index] = resultSymbol;
            reels[index].textContent = resultSymbol.icon;

            if (!isSpinning.includes(true)) {
                judgeResult(isAuto);
            }
        }

        stopBtns.forEach((btn, i) => {
            btn.addEventListener('click', () => {
                stopReel(i, false);
            });
        });

        // --- 結果判定処理 ---
        async function judgeResult(isAuto) {
            let winAmount = 0;
            const icon1 = finalResults[0].icon;
            const icon2 = finalResults[1].icon;
            const icon3 = finalResults[2].icon;
            
            let updateData = {};

            if (icon1 === icon2 && icon2 === icon3) {
                winAmount = finalResults[0].multiplier * currentBetAmount;
                messageDisplay.textContent = `🎉 大当たり！ ${winAmount} クレジット獲得！`;
                messageDisplay.style.color = "#f1c40f";
                
                // 🈵が揃った場合、カウントを増やす
                if (icon1 === "🈵") {
                    manCount++;
                    updateData.manCount = manCount;
                }
            } else if (icon1 === "🍒" || icon2 === "🍒" || icon3 === "🍒") {
                const cherrySymbol = symbolConfig.find(s => s.icon === "🍒");
                winAmount = cherrySymbol.multiplier * currentBetAmount;
                messageDisplay.textContent = `🍒 チェリーボーナス！ ${winAmount} クレジット獲得！`;
                messageDisplay.style.color = "#2ecc71";
            } else {
                messageDisplay.textContent = "ハズレ...";
                messageDisplay.style.color = "#e74c3c";
            }

            if (winAmount > 0) {
                updateData.credit = currentCredit + winAmount;
            }
            
            if (Object.keys(updateData).length > 0) {
                await update(ref(db, 'users/' + currentUsername), updateData);
            }

            // 次の動作の準備
            if (isAuto && isAutoSpinning) {
                autoSpinTimeout = setTimeout(() => {
                    if (isAutoSpinning && currentCredit >= parseInt(betSelect.value, 10)) {
                        executeSpin(true);
                    } else {
                        stopAutoSpin();
                    }
                }, 1500);
            } else {
                betSelect.disabled = false;
                checkSpinPossibility();
            }
        }
    </script>
</body>
</html>
