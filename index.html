<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase スロットゲーム</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin-top: 50px;
        }
        #game-section {
            display: none; /* 初期状態では隠す */
        }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .reel {
            width: 80px;
            height: 80px;
            background-color: #fff;
            border: 4px solid #f1c40f;
            border-radius: 10px;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        input {
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
        }
        #message { font-size: 20px; font-weight: bold; color: #f1c40f; height: 30px; }
        .credit-box { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🎰 スロットゲーム</h1>

    <!-- ログイン（ユーザー名入力）セクション -->
    <div id="login-section">
        <p>ユーザー名を入力してゲームを始めてください</p>
        <input type="text" id="username-input" placeholder="ユーザー名" />
        <button id="login-btn">ゲーム開始</button>
    </div>

    <!-- ゲームプレイセクション -->
    <div id="game-section">
        <p>プレイヤー: <strong id="display-name"></strong></p>
        <div class="credit-box">
            クレジット: <span id="credit-display">0</span>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>

        <button id="spin-btn">スピン (1クレジット消費)</button>
        <p id="message"></p>
    </div>

    <!-- Firebase SDK (ES Module形式) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // あなたのFirebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf",
            measurementId: "G-S5Z8TTWYE2"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ゲームの変数 ---
        let currentUsername = "";
        let currentCredit = 0;
        const symbols = ["🍒", "🔔", "🍉", "⭐", "7️⃣"];
        const INITIAL_CREDIT = 50; // 初回ログイン時の付与クレジット

        // --- HTML要素の取得 ---
        const loginSection = document.getElementById('login-section');
        const gameSection = document.getElementById('game-section');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const displayName = document.getElementById('display-name');
        const creditDisplay = document.getElementById('credit-display');
        const spinBtn = document.getElementById('spin-btn');
        const messageDisplay = document.getElementById('message');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];

        // --- ログイン処理 ---
        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            if (!username) {
                alert("ユーザー名を入力してください！");
                return;
            }

            currentUsername = username;
            const dbRef = ref(db);
            const userRef = ref(db, 'users/' + currentUsername);

            try {
                // データベースからユーザー情報を取得
                const snapshot = await get(child(dbRef, `users/${currentUsername}`));
                if (snapshot.exists()) {
                    // 既存ユーザーの場合
                    currentCredit = snapshot.val().credit;
                } else {
                    // 新規ユーザーの場合、初期クレジットを保存
                    currentCredit = INITIAL_CREDIT;
                    await set(userRef, {
                        credit: currentCredit
                    });
                }

                // UIの切り替え
                loginSection.style.display = 'none';
                gameSection.style.display = 'block';
                displayName.textContent = currentUsername;

                // データベースのクレジット変動をリアルタイムで監視（画面に反映）
                onValue(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        currentCredit = snapshot.val().credit;
                        creditDisplay.textContent = currentCredit;
                        // クレジットが0の場合はスピン不可にする
                        spinBtn.disabled = currentCredit <= 0;
                    }
                });

            } catch (error) {
                console.error("エラーが発生しました:", error);
                alert("データベースへの接続に失敗しました。");
            }
        });

        // --- スロットを回す処理 ---
        spinBtn.addEventListener('click', async () => {
            if (currentCredit <= 0) return;

            // ボタンを一時無効化し、クレジットを1減らす
            spinBtn.disabled = true;
            messageDisplay.textContent = "スピン中...";
            
            const newCredit = currentCredit - 1;
            // 先にFirebaseのクレジットを更新
            await update(ref(db, 'users/' + currentUsername), { credit: newCredit });

            // スロットのアニメーション（ダミー）
            let counter = 0;
            const interval = setInterval(() => {
                reels.forEach(reel => {
                    reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                });
                counter++;
                
                // 10回シャッフルしたら止める
                if (counter > 10) {
                    clearInterval(interval);
                    judgeResult();
                }
            }, 100);
        });

        // --- 結果の判定 ---
        async function judgeResult() {
            const resultSymbols = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];

            // リールに最終結果を表示
            reels[0].textContent = resultSymbols[0];
            reels[1].textContent = resultSymbols[1];
            reels[2].textContent = resultSymbols[2];

            // 判定ロジック（3つ揃ったら当たり）
            if (resultSymbols[0] === resultSymbols[1] && resultSymbols[1] === resultSymbols[2]) {
                let winAmount = 0;
                if (resultSymbols[0] === "7️⃣") winAmount = 50;
                else if (resultSymbols[0] === "⭐") winAmount = 20;
                else winAmount = 10;

                messageDisplay.textContent = `🎉 大当たり！ ${winAmount} クレジット獲得！`;
                messageDisplay.style.color = "#2ecc71";

                // 当たり分をFirebaseに加算
                await update(ref(db, 'users/' + currentUsername), { 
                    credit: currentCredit + winAmount 
                });
            } else {
                messageDisplay.textContent = "ハズレ...";
                messageDisplay.style.color = "#e74c3c";
            }

            // スピンボタンを元に戻す
            if (currentCredit > 0) {
                spinBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
